<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galgame 主菜单</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <nav class="menu">
            <ul>
                <li><button onclick="startGame()"><span>*</span> 新游戏</button></li>
                <li><button onclick="loadGame()"><span>-</span> 读取存档</button></li>
                <li><button onclick="continueGame()"><span>|</span> 继续游戏</button></li>
                <li><button onclick="flowchart()"><span>∴</span> 流程图</button></li>
                <li><button onclick="settings()"><span>⚙</span> 系统设置</button></li>
                <li><button onclick="exitGame()"><span>⏻</span> 结束游戏</button></li>
            </ul>
        </nav>
    </div>

    <div id="saveLoadOverlay" class="save-overlay">
        <h2 id="saveLoadTitle" style="color: white; margin-bottom: 20px;">存档 / 读档</h2>
        <div class="slot-container">
            <div class="save-slot" onclick="handleSlotClick(1)">
                <div class="slot-img-box"><img id="slot-img-1" src="" alt=""></div>
                <div class="slot-info" id="slot-info-1">空存档</div>
            </div>
            <div class="save-slot" onclick="handleSlotClick(2)">
                <div class="slot-img-box"><img id="slot-img-2" src="" alt=""></div>
                <div class="slot-info" id="slot-info-2">空存档</div>
            </div>
            <div class="save-slot" onclick="handleSlotClick(3)">
                <div class="slot-img-box"><img id="slot-img-3" src="" alt=""></div>
                <div class="slot-info" id="slot-info-3">空存档</div>
            </div>
        </div>
        <button class="close-btn" onclick="closeSaveLoadMenu()">返回游戏</button>
    </div>

    <audio id="gameBgm" src="bgm.ogg" loop preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
