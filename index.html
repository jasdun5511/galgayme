<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galgame 主菜单</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        
        <nav class="menu">
            <ul>
                <li><button onclick="startGame()"><span>*</span> 新游戏</button></li>
                <li><button onclick="loadGame()"><span>-</span> 读取存档</button></li>
                <li><button onclick="continueGame()"><span>|</span> 继续游戏</button></li>
                <li><button onclick="flowchart()"><span>∴</span> 流程图</button></li>
                <li><button onclick="settings()"><span>⚙</span> 系统设置</button></li>
                <li><button onclick="exitGame()"><span>⏻</span> 结束游戏</button></li>
            </ul>
        </nav>
        
    </div>

    <audio id="gameBgm" src="bgm.mp3" loop preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
